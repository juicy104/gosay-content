name: Sync Content To App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout content repo
        uses: actions/checkout@v4

      - name: Validate content structure
        run: sh ./scripts/validate-content.sh

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GOSAY_APP_REPOSITORY }}
          ref: ${{ vars.GOSAY_APP_BRANCH || 'main' }}
          token: ${{ secrets.GOSAY_APP_SYNC_TOKEN }}
          path: app-repo

      - name: Sync phrase content into app repo
        run: |
          mkdir -p app-repo/content
          rm -rf app-repo/content/phrases
          cp -R content/phrases app-repo/content/phrases
          cp content/phrases-index.md app-repo/content/phrases-index.md

      - name: Commit and push if changed
        run: |
          cd app-repo
          if git diff --quiet -- content/phrases content/phrases-index.md; then
            echo "No content changes to sync"
            exit 0
          fi

          git config user.name "juicy"
          git config user.email "277392224+juicy104@users.noreply.github.com"
          git add content/phrases content/phrases-index.md
          git commit -m "Sync content from gosay-content"
          git push origin HEAD:${{ vars.GOSAY_APP_BRANCH || 'main' }}
